services:
  postgres:
    image: postgres:16-alpine
    container_name: luma-list-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: luma_list
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d luma_list"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - luma_list_postgres_data:/var/lib/postgresql/data

volumes:
  luma_list_postgres_data:
